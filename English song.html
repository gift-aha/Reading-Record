<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>🎤 英语歌学习助手 </title>
    <!-- SortableJS 和 html2canvas -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #f2ede7;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 16px;
            color: #1e1e2a;
            transition: filter 0.2s;
        }

        body.immersive-active {
            overflow: hidden;
            filter: brightness(0.95);
        }

        body.toolbox-open {
            overflow: hidden;
        }

        .library-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .title-section h1 {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            font-weight: 650;
            font-size: 1.9rem;
            color: #1e1e2a;
            letter-spacing: -0.02em;
        }

        .title-section h1 span {
            background: #1e1e2a;
            color: #f2ede7;
            font-size: 0.9rem;
            padding: 5px 14px;
            border-radius: 40px;
            font-weight: 450;
        }

        .subhead {
            color: #4b4b60;
            font-size: 1.05rem;
            margin-top: 6px;
            border-left: 4px solid #b9afa5;
            padding-left: 20px;
            background: #e9e1d9;
            border-radius: 0 30px 30px 0;
            width: fit-content;
            padding: 10px 24px 10px 20px;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 25px 0 20px;
            align-items: center;
        }

        .btn {
            background: white;
            border: 1.5px solid #d0c6bc;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 500;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.15s;
            color: #1e1e2a;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }

        .btn.primary {
            background: #1e1e2a;
            border-color: #1e1e2a;
            color: white;
        }

        .btn.primary:hover {
            background: #2f2f40;
        }

        .btn.toolbox-btn {
            background: #e0d9d0;
            border-color: #b9aea3;
            font-size: 1.1rem;
        }

        .search-area {
            flex: 2;
            min-width: 240px;
            display: flex;
            gap: 8px;
            background: white;
            border: 1.5px solid #d0c6bc;
            border-radius: 50px;
            padding: 4px 4px 4px 20px;
            align-items: center;
            margin-left: auto;
        }

        .search-area input {
            flex: 1;
            border: none;
            padding: 10px 0;
            font-size: 1rem;
            background: transparent;
            outline: none;
            min-width: 160px;
        }

        .search-area button {
            background: #1e1e2a;
            border: none;
            color: white;
            padding: 8px 22px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.1s;
            white-space: nowrap;
        }

        .search-area button:hover {
            background: #2f2f40;
        }

        #storageStatus {
            font-size: 0.85rem;
            color: #6f675f;
            background: #e7dfd7;
            padding: 6px 18px;
            border-radius: 30px;
            white-space: nowrap;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin: 20px 0 30px;
        }

        @media (min-width: 640px) {
            .cards-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 1024px) {
            .cards-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .song-card {
            background: #ffffff;
            border-radius: 28px;
            padding: 0;
            box-shadow: 0 12px 24px -8px rgba(0,0,0,0.08);
            border: 1px solid #e6dbd2;
            transition: 0.1s;
            overflow: hidden;
            position: relative;
        }

        .card-header {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: #ffffff;
            cursor: pointer;
            user-select: none;
            border-bottom: 1px solid transparent;
            transition: background 0.1s;
            flex-wrap: wrap;
            gap: 6px;
        }

        .drag-handle {
            font-size: 1.6rem;
            color: #b1a69b;
            cursor: grab;
            width: 30px;
            text-align: center;
            flex-shrink: 0;
            user-select: none;
        }

        .star-icon {
            font-size: 1.6rem;
            color: #f5c542;
            cursor: pointer;
            width: 30px;
            text-align: center;
            flex-shrink: 0;
            background: none;
            border: none;
            padding: 0;
        }

        .header-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex: 1;
            min-width: 140px;
        }

        .header-title {
            font-weight: 650;
            font-size: 1.2rem;
            color: #1e1e2a;
            line-height: 1.3;
        }

        .header-artist {
            font-size: 0.85rem;
            color: #8b7f74;
            font-style: italic;
        }

        .header-meta {
            display: flex;
            gap: 6px;
            font-size: 0.7rem;
            color: #756b62;
            text-transform: uppercase;
            letter-spacing: 0.2px;
            flex-wrap: wrap;
        }

        .header-meta span {
            background: #eee7e0;
            padding: 3px 8px;
            border-radius: 20px;
        }

        .action-icons {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .icon-btn {
            background: none;
            border: none;
            font-size: 1.4rem;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.1s;
            color: #5f554b;
            background: #f3ede7;
            flex-shrink: 0;
        }

        .icon-btn:hover {
            background: #e0d6cd;
            color: #1e1e2a;
        }

        .delete-btn {
            background: none;
            border: 1px solid #f3cdc8;
            color: #b14f48;
            font-size: 1.4rem;
            width: 38px;
            height: 38px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background: #fef5f3;
        }

        .expand-icon {
            font-size: 1.8rem;
            color: #9f9186;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
            background: #f3ede7;
        }

        .card-details {
            padding: 0 18px 20px 18px;
            border-top: 1px solid #ede3db;
            background: #fefbf8;
        }

        .details-inner {
            display: flex;
            flex-direction: column;
            gap: 14px;
            padding-top: 14px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .field-label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            color: #7b6f66;
            margin-left: 6px;
        }

        .field input, .field textarea {
            width: 100%;
            border: 1px solid #d9cdc2;
            border-radius: 18px;
            padding: 12px 16px;
            font-size: 0.95rem;
            line-height: 1.5;
            background: #fffcf9;
            transition: 0.1s;
            font-family: inherit;
            resize: vertical;
        }

        .field input:focus, .field textarea:focus {
            outline: none;
            border-color: #9a897d;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(30,30,42,0.08);
        }

        .no-matches {
            text-align: center;
            padding: 40px;
            background: #faf5f0;
            border-radius: 40px;
            color: #7b6f66;
            font-size: 1.2rem;
            grid-column: 1 / -1;
        }

        /* 沉浸式模态框 */
        .immersive-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .immersive-card {
            background: white;
            border-radius: 32px;
            max-width: 800px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 24px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
        }

        .immersive-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .immersive-header h2 {
            font-size: 1.8rem;
            color: #1e1e2a;
        }

        .close-immersive {
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            width: 50px;
            height: 50px;
            border-radius: 30px;
            background: #f0e9e2;
        }

        .immersive-fields {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        /* 工具箱侧边栏 (右侧，整合所有功能) */
        .toolbox-panel {
            position: fixed;
            top: 0;
            right: -450px;
            width: 420px;
            max-width: 90%;
            height: 100vh;
            background: #fffcf8;
            box-shadow: -10px 0 30px rgba(0,0,0,0.15);
            transition: right 0.25s ease;
            z-index: 2000;
            padding: 24px 20px;
            overflow-y: auto;
            border-left: 1px solid #e0d4cb;
        }

        .toolbox-panel.open {
            right: 0;
        }

        .toolbox-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .toolbox-header h2 {
            font-size: 1.8rem;
            color: #1e1e2a;
        }

        .close-toolbox {
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            width: 44px;
            height: 44px;
            border-radius: 30px;
            background: #f0e9e2;
        }

        .toolbox-section {
            margin-bottom: 30px;
        }

        .toolbox-section h3 {
            font-size: 1.2rem;
            margin-bottom: 12px;
            color: #4b3f36;
            border-left: 4px solid #b9afa5;
            padding-left: 12px;
        }

        .toolbox-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .toolbox-btn {
            background: #f0e9e2;
            border: 1.5px solid #d0c6bc;
            padding: 10px 18px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.1s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .toolbox-btn.star-filter.active {
            background: #f5c542;
            border-color: #b0820f;
        }

        .toolbox-btn:hover {
            background: #e0d6cd;
        }

        /* 词汇本列表 (在工具箱内) */
        .vocab-list {
            list-style: none;
            padding: 0;
            max-height: 350px;
            overflow-y: auto;
            border-top: 1px solid #ede3db;
            margin-top: 10px;
        }

        .vocab-item {
            display: flex;
            flex-direction: column;
            background: #f6f0ea;
            border-radius: 30px;
            margin-bottom: 8px;
            padding: 0;
            border: 1px solid transparent;
        }

        .vocab-main {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            cursor: pointer;
        }

        .vocab-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .vocab-word {
            font-weight: 500;
            font-size: 1rem;
            color: #1e1e2a;
        }

        .vocab-count {
            background: #d3c8be;
            color: #1e1e2a;
            padding: 3px 8px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .vocab-note-icon {
            font-size: 1.2rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 30px;
            background: #e8dfd7;
            user-select: none;
            transition: 0.1s;
            margin-right: 4px;
        }

        .vocab-note-icon:hover {
            background: #d1c3b7;
        }

        .vocab-note-editor {
            padding: 0 16px 16px 16px;
            display: none;
        }

        .vocab-note-editor.open {
            display: block;
        }

        .vocab-note-editor textarea {
            width: 100%;
            border: 1px solid #d9cdc2;
            border-radius: 20px;
            padding: 12px;
            font-size: 0.9rem;
            background: white;
            resize: vertical;
            min-height: 70px;
            font-family: inherit;
        }

        .vocab-note-editor textarea:focus {
            outline: none;
            border-color: #9a897d;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3);
            z-index: 1500;
        }

        .overlay.show {
            display: block;
        }

        .footer-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 30px;
            background: #eae2da;
            padding: 14px 22px;
            border-radius: 60px;
            color: #2d2d3a;
            font-weight: 500;
        }

        .song-count {
            background: #1e1e2a;
            color: #f0e9e2;
            padding: 6px 20px;
            border-radius: 40px;
            font-size: 0.95rem;
        }

        .tip-note {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
        }

        #importFile {
            display: none;
        }
    </style>
</head>
<body>
<div class="library-container">
    <div class="title-section">
        <h1>
            🎤 英语歌学习助手 
            <span>一键显示全部</span>
        </h1>
        <div class="subhead">
            ✍️ 点击🔧打开工具箱 
        </div>
    </div>

    <!-- 顶部工具栏：只有添加歌曲、工具箱按钮、搜索和状态 -->
    <div class="toolbar">
        <button class="btn primary" id="addCardBtn">➕ 添加新歌曲</button>
        <button class="btn toolbox-btn" id="toolboxToggleBtn">🔧 工具箱</button>
        
        <div class="search-area">
            <input type="text" id="searchInput" placeholder="搜索歌手、歌名、标签..." value="">
            <button id="searchBtn">🔍 搜索</button>
        </div>
        
        <span id="storageStatus">已自动保存</span>
    </div>

    <!-- 卡片网格 -->
    <div id="cardsGrid" class="cards-grid"></div>

    <!-- 底部信息 -->
    <div class="footer-info">
        <div class="tip-note">
            <span>💡 拖动☰排序 · ⭐收藏 · 🧘沉浸 · 📸导出图片</span>
        </div>
        <div class="song-count" id="songCount">0 首歌曲</div>
    </div>
</div>

<!-- 沉浸式模态框 -->
<div id="immersiveModal" class="immersive-modal">
    <div class="immersive-card" id="immersiveCard">
        <div class="immersive-header">
            <h2 id="immersiveTitle">专注学习</h2>
            <button class="close-immersive" id="closeImmersiveBtn">✕</button>
        </div>
        <div id="immersiveFields" class="immersive-fields"></div>
    </div>
</div>

<!-- 工具箱侧边栏（整合所有功能，新增“显示全部”按钮） -->
<div id="toolboxPanel" class="toolbox-panel">
    <div class="toolbox-header">
        <h2>🧰 工具箱</h2>
        <button class="close-toolbox" id="closeToolboxBtn">✕</button>
    </div>

    <!-- 功能区 -->
    <div class="toolbox-section">
        <h3>📋 数据操作</h3>
        <div class="toolbox-buttons">
            <button class="toolbox-btn" id="toolboxSaveBtn">💾 导出备份</button>
            <button class="toolbox-btn" id="toolboxLoadBtn">📂 导入备份</button>
            <button class="toolbox-btn" id="toolboxResetBtn">↺ 重置默认</button>
            <button class="toolbox-btn star-filter" id="toolboxStarFilterBtn">⭐ 只看收藏</button>
            <button class="toolbox-btn" id="toolboxResetSearchBtn">🔄 显示全部</button> <!-- 新增按钮 -->
        </div>
    </div>

    <div class="toolbox-section">
        <h3>📖 词汇本 <span style="font-size:0.8rem; font-weight:normal;">(点击词汇筛选)</span></h3>
        <div id="vocabListContainer" class="vocab-list-container">
            <!-- 词汇列表动态生成 -->
        </div>
    </div>
    <p style="color:#7b6f66; font-size:0.8rem; margin-top:8px;">点击📝为词汇添加笔记</p>
</div>
<div id="overlay" class="overlay"></div>

<!-- 隐藏的文件输入，用于导入 -->
<input type="file" id="importFile" accept="application/json">

<script>

            { artist: 'Taylor Swift', song: 'The Last Great American Dynasty', album: 'folklore', level: '高级', tags: '历史,故事,独立', starred: false, vocab: 'dynasty, scandal, saltbox house, affair', pronunciation: '叙事气声, \'there goes\'连读', grammar: '过去完成时', culture: '罗德岛豪宅真实历史', lyrics: 'There goes the last great American dynasty...', notes: '短篇小说结构' },
            { artist: 'Taylor Swift', song: 'Long Live', album: 'Speak Now', level: '中级', tags: '励志,感谢,摇滚', starred: true, vocab: 'crown, cheers, dragons, kingdom', pronunciation: '副歌力量发声', grammar: '祈愿语气', culture: '写给乐队和粉丝', lyrics: 'Long live the walls we crashed through...', notes: '毕业典礼可用' },
            { artist: 'Ed Sheeran', song: 'Shape of You', album: '÷', level: '中级', tags: '流行,节奏', starred: false, vocab: 'shape, push and pull', pronunciation: '连读', grammar: '现在进行时', culture: '健身房神曲', lyrics: 'I\'m in love with your body', notes: '适合练连读' },
            { artist: 'Adele', song: 'Hello', album: '25', level: '中级', tags: '伤感,经典', starred: false, vocab: 'hello from the other side', pronunciation: '颤音', grammar: '现在完成时', culture: '电话留言', lyrics: 'Hello, it\'s me', notes: '练情感表达' },
            { artist: 'Bruno Mars', song: 'Just the Way You Are', album: 'Doo-Wops', level: '初级', tags: '浪漫,流行', starred: false, vocab: 'amazing, just the way you are', pronunciation: '连读', grammar: '一般现在时', culture: '情歌经典', lyrics: 'When I see your face...', notes: '简单温暖' }
        ];

        // 数据源
        let songsData = [];
        let expandedState = [];

        // 词汇笔记对象: { word: "笔记内容" }
        let vocabNotes = {};

        let currentSearchTerm = '';
        let showOnlyStarred = false;

        let sortableInstance = null;

        const STORAGE_KEY = 'multisinger_songs';
        const EXPAND_STORAGE_KEY = 'multisinger_expand';
        const NOTES_STORAGE_KEY = 'vocab_notes';

        const gridEl = document.getElementById('cardsGrid');
        const storageStatus = document.getElementById('storageStatus');
        const songCountSpan = document.getElementById('songCount');
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');

        // 工具箱相关
        const toolboxPanel = document.getElementById('toolboxPanel');
        const overlay = document.getElementById('overlay');
        const toolboxToggleBtn = document.getElementById('toolboxToggleBtn');
        const closeToolboxBtn = document.getElementById('closeToolboxBtn');
        const toolboxStarFilterBtn = document.getElementById('toolboxStarFilterBtn');
        const toolboxResetSearchBtn = document.getElementById('toolboxResetSearchBtn'); // 新增
        const vocabListContainer = document.getElementById('vocabListContainer');

        // 导入文件输入
        const importFile = document.getElementById('importFile');

        const modal = document.getElementById('immersiveModal');
        const closeImmersiveBtn = document.getElementById('closeImmersiveBtn');
        const immersiveTitle = document.getElementById('immersiveTitle');
        const immersiveFields = document.getElementById('immersiveFields');

        // ----- 本地存储操作 -----
        function loadFromStorage() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                try {
                    songsData = JSON.parse(stored);
                } catch (e) {
                    songsData = JSON.parse(JSON.stringify(DEFAULT_SONGS));
                }
            } else {
                songsData = JSON.parse(JSON.stringify(DEFAULT_SONGS));
            }

            const notesStored = localStorage.getItem(NOTES_STORAGE_KEY);
            if (notesStored) {
                try {
                    vocabNotes = JSON.parse(notesStored) || {};
                } catch (e) {
                    vocabNotes = {};
                }
            } else {
                vocabNotes = {};
            }

            expandedState = new Array(songsData.length).fill(false);
            const expStored = localStorage.getItem(EXPAND_STORAGE_KEY);
            if (expStored) {
                try {
                    const savedExp = JSON.parse(expStored);
                    if (Array.isArray(savedExp) && savedExp.length === songsData.length) {
                        expandedState = savedExp;
                    }
                } catch (e) {}
            }
        }

        function saveToStorage(quiet = false) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(songsData));
            localStorage.setItem(EXPAND_STORAGE_KEY, JSON.stringify(expandedState));
            localStorage.setItem(NOTES_STORAGE_KEY, JSON.stringify(vocabNotes));
            if (!quiet) {
                storageStatus.innerText = '已保存至浏览器 ' + new Date().toLocaleTimeString();
            } else {
                storageStatus.innerText = '已自动保存';
            }
            updateSongCount();
        }

        function updateSongCount() {
            if (songCountSpan) {
                songCountSpan.innerText = songsData.length + ' 首歌曲';
            }
        }

        // ----- 过滤函数 -----
        function getFilteredIndices(term, onlyStarred) {
            let indices = songsData.map((_, idx) => idx);
            if (term.trim()) {
                const lowerTerm = term.trim().toLowerCase();
                indices = indices.filter(idx => {
                    const song = songsData[idx];
                    const searchable = [
                        song.song, song.artist, song.album, song.level, song.tags,
                        song.vocab, song.pronunciation, song.grammar, song.culture, song.lyrics, song.notes
                    ];
                    return searchable.some(val => val && val.toLowerCase().includes(lowerTerm));
                });
            }
            if (onlyStarred) {
                indices = indices.filter(idx => songsData[idx].starred === true);
            }
            return indices;
        }

        // ----- 词汇本：构建词汇列表 -----
        function buildVocabList() {
            const vocabMap = new Map(); // word -> count
            songsData.forEach(song => {
                if (song.vocab) {
                    const words = song.vocab.split(',').map(w => w.trim()).filter(w => w.length > 0);
                    words.forEach(w => {
                        vocabMap.set(w, (vocabMap.get(w) || 0) + 1);
                    });
                }
            });
            return Array.from(vocabMap.entries()).sort((a, b) => a[0].localeCompare(b[0]));
        }

        // 保存词汇笔记
        function saveVocabNote(word, content) {
            if (content.trim() === '') {
                delete vocabNotes[word];
            } else {
                vocabNotes[word] = content;
            }
            saveToStorage(true);
        }

        // 渲染词汇本（在工具箱内）
        function renderVocabPanel() {
            const vocabEntries = buildVocabList();
            if (vocabEntries.length === 0) {
                vocabListContainer.innerHTML = '<p style="padding: 20px; text-align: center; color: #7b6f66;">暂无词汇，请先添加歌曲并填写“核心词汇/短语”</p>';
                return;
            }

            let html = '<ul class="vocab-list">';
            vocabEntries.forEach(([word, count]) => {
                const note = vocabNotes[word] || '';
                const safeId = 'note-' + word.replace(/\s+/g, '_').replace(/[^a-zA-Z0-9_]/g, '');
                html += `
                <li class="vocab-item" data-word="${word.replace(/"/g, '&quot;')}">
                    <div class="vocab-main">
                        <div class="vocab-left">
                            <span class="vocab-word">${word}</span>
                            <span class="vocab-count">${count}</span>
                        </div>
                        <span class="vocab-note-icon" data-word="${word.replace(/"/g, '&quot;')}">📝</span>
                    </div>
                    <div id="${safeId}" class="vocab-note-editor ${note ? 'open' : ''}">
                        <textarea class="vocab-note-textarea" data-word="${word.replace(/"/g, '&quot;')}" placeholder="记录发音/翻译/注意事项...">${note.replace(/"/g, '&quot;')}</textarea>
                    </div>
                </li>`;
            });
            html += '</ul>';
            vocabListContainer.innerHTML = html;

            // 绑定事件：点击词汇主区域筛选歌曲
            document.querySelectorAll('.vocab-main').forEach(main => {
                main.addEventListener('click', (e) => {
                    if (e.target.classList.contains('vocab-note-icon')) return;
                    const li = main.closest('.vocab-item');
                    const word = li.dataset.word;
                    searchInput.value = word;
                    currentSearchTerm = word;
                    showOnlyStarred = false;
                    updateStarFilterButton();
                    renderCards();
                    // 不关闭工具箱，但用户可以自行关闭
                });
            });

            // 绑定笔记图标点击：展开/收起编辑器
            document.querySelectorAll('.vocab-note-icon').forEach(icon => {
                icon.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const word = icon.dataset.word;
                    const safeId = 'note-' + word.replace(/\s+/g, '_').replace(/[^a-zA-Z0-9_]/g, '');
                    const editor = document.getElementById(safeId);
                    if (editor) {
                        editor.classList.toggle('open');
                        if (editor.classList.contains('open')) {
                            const ta = editor.querySelector('textarea');
                            if (ta) ta.focus();
                        }
                    }
                });
            });

            // 绑定文本域失焦保存
            document.querySelectorAll('.vocab-note-textarea').forEach(ta => {
                ta.addEventListener('blur', (e) => {
                    const word = e.target.dataset.word;
                    saveVocabNote(word, e.target.value);
                });
            });
        }

        // 更新只看收藏按钮的样式
        function updateStarFilterButton() {
            if (showOnlyStarred) {
                toolboxStarFilterBtn.classList.add('active');
            } else {
                toolboxStarFilterBtn.classList.remove('active');
            }
        }

        // 打开/关闭工具箱
        function openToolbox() {
            renderVocabPanel();  // 每次打开刷新词汇本
            toolboxPanel.classList.add('open');
            overlay.classList.add('show');
            document.body.classList.add('toolbox-open');
        }

        function closeToolbox() {
            toolboxPanel.classList.remove('open');
            overlay.classList.remove('show');
            document.body.classList.remove('toolbox-open');
        }

        // ----- 初始化Sortable -----
        function initSortable() {
            if (sortableInstance) sortableInstance.destroy();
            sortableInstance = new Sortable(gridEl, {
                handle: '.drag-handle',
                animation: 200,
                onEnd: function(evt) {
                    const cards = document.querySelectorAll('.song-card');
                    const newOrder = Array.from(cards).map(c => parseInt(c.dataset.originalIndex));
                    const newSongs = newOrder.map(i => songsData[i]);
                    const newExpanded = newOrder.map(i => expandedState[i]);
                    songsData = newSongs;
                    expandedState = newExpanded;
                    renderCards();
                    saveToStorage(true);
                }
            });
        }

        // ----- 渲染卡片 -----
        function renderCards() {
            if (!gridEl) return;
            const filteredIndices = getFilteredIndices(currentSearchTerm, showOnlyStarred);
            
            if (filteredIndices.length === 0) {
                gridEl.innerHTML = `<div class="no-matches">✨ 没有匹配的歌曲，试试其他关键词吧</div>`;
                updateSongCount();
                return;
            }

            gridEl.innerHTML = '';

            filteredIndices.forEach(originalIndex => {
                const song = songsData[originalIndex];
                const isExpanded = expandedState[originalIndex] || false;

                const card = document.createElement('div');
                card.className = 'song-card';
                card.dataset.originalIndex = originalIndex;

                const header = document.createElement('div');
                header.className = 'card-header';

                const dragHandle = document.createElement('span');
                dragHandle.className = 'drag-handle';
                dragHandle.innerText = '☰';
                header.appendChild(dragHandle);

                const starBtn = document.createElement('button');
                starBtn.className = 'icon-btn star-icon';
                starBtn.innerText = song.starred ? '⭐' : '☆';
                starBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    songsData[originalIndex].starred = !songsData[originalIndex].starred;
                    saveToStorage(true);
                    starBtn.innerText = songsData[originalIndex].starred ? '⭐' : '☆';
                });
                header.appendChild(starBtn);

                const infoDiv = document.createElement('div');
                infoDiv.className = 'header-info';

                const titleLine = document.createElement('div');
                titleLine.className = 'header-title';
                titleLine.innerText = song.song || '未命名歌曲';
                infoDiv.appendChild(titleLine);

                const artistLine = document.createElement('div');
                artistLine.className = 'header-artist';
                artistLine.innerText = song.artist || '未知歌手';
                infoDiv.appendChild(artistLine);

                const metaDiv = document.createElement('div');
                metaDiv.className = 'header-meta';
                const albumSpan = document.createElement('span');
                albumSpan.innerText = song.album || '未知专辑';
                const levelSpan = document.createElement('span');
                levelSpan.innerText = song.level || '未分级';
                metaDiv.appendChild(albumSpan);
                metaDiv.appendChild(levelSpan);
                if (song.tags) {
                    const firstTag = song.tags.split(',')[0].trim();
                    if (firstTag) {
                        const tagSpan = document.createElement('span');
                        tagSpan.innerText = '#' + firstTag;
                        metaDiv.appendChild(tagSpan);
                    }
                }
                infoDiv.appendChild(metaDiv);
                header.appendChild(infoDiv);

                const actionIcons = document.createElement('div');
                actionIcons.className = 'action-icons';

                const immersiveBtn = document.createElement('button');
                immersiveBtn.className = 'icon-btn';
                immersiveBtn.innerText = '🧘';
                immersiveBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    openImmersive(originalIndex);
                });
                actionIcons.appendChild(immersiveBtn);

                const exportBtn = document.createElement('button');
                exportBtn.className = 'icon-btn';
                exportBtn.innerText = '📸';
                exportBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    exportCardAsImage(card);
                });
                actionIcons.appendChild(exportBtn);

                const delBtn = document.createElement('button');
                delBtn.className = 'delete-btn';
                delBtn.innerHTML = '🗑️';
                delBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (confirm(`确定删除《${song.song || '未命名'}'》吗？`)) {
                        songsData.splice(originalIndex, 1);
                        expandedState.splice(originalIndex, 1);
                        renderCards();
                        saveToStorage();
                    }
                });
                actionIcons.appendChild(delBtn);

                const expandIcon = document.createElement('span');
                expandIcon.className = 'icon-btn expand-icon';
                expandIcon.innerText = isExpanded ? '−' : '+';
                expandIcon.addEventListener('click', (e) => {
                    e.stopPropagation();
                    expandedState[originalIndex] = !expandedState[originalIndex];
                    renderCards();
                    saveToStorage(true);
                });
                actionIcons.appendChild(expandIcon);

                header.appendChild(actionIcons);

                header.addEventListener('click', (e) => {
                    if (e.target.closest('button') || e.target.closest('.icon-btn') || e.target.closest('.delete-btn') || e.target.closest('.drag-handle') || e.target.closest('.star-icon')) return;
                    expandedState[originalIndex] = !expandedState[originalIndex];
                    renderCards();
                    saveToStorage(true);
                });

                card.appendChild(header);

                if (isExpanded) {
                    const details = document.createElement('div');
                    details.className = 'card-details';
                    const inner = document.createElement('div');
                    inner.className = 'details-inner';

                    FIELDS.forEach(field => {
                        const fieldDiv = document.createElement('div');
                        fieldDiv.className = 'field';

                        const label = document.createElement('span');
                        label.className = 'field-label';
                        label.innerText = field.label;
                        fieldDiv.appendChild(label);

                        let input;
                        if (field.tag === 'input') {
                            input = document.createElement('input');
                            input.type = 'text';
                            input.value = song[field.key] || '';
                        } else {
                            input = document.createElement('textarea');
                            input.rows = field.rows || 2;
                            input.value = song[field.key] || '';
                        }

                        input.addEventListener('input', (e) => {
                            songsData[originalIndex][field.key] = e.target.value;
                            saveToStorage(true);
                        });

                        fieldDiv.appendChild(input);
                        inner.appendChild(fieldDiv);
                    });

                    details.appendChild(inner);
                    card.appendChild(details);
                }

                gridEl.appendChild(card);
            });

            initSortable();
            updateSongCount();
        }

        // 沉浸式
        function openImmersive(index) {
            const song = songsData[index];
            immersiveTitle.innerText = song.song || '专注学习';
            immersiveFields.innerHTML = '';
            FIELDS.forEach(field => {
                const fieldDiv = document.createElement('div');
                fieldDiv.className = 'field';
                const label = document.createElement('span');
                label.className = 'field-label';
                label.innerText = field.label;
                fieldDiv.appendChild(label);
                let input;
                if (field.tag === 'input') {
                    input = document.createElement('input');
                    input.type = 'text';
                    input.value = song[field.key] || '';
                } else {
                    input = document.createElement('textarea');
                    input.rows = field.rows || 2;
                    input.value = song[field.key] || '';
                }
                input.addEventListener('input', (e) => {
                    songsData[index][field.key] = e.target.value;
                    saveToStorage(true);
                });
                fieldDiv.appendChild(input);
                immersiveFields.appendChild(fieldDiv);
            });
            modal.style.display = 'flex';
            document.body.classList.add('immersive-active');
        }

        function closeImmersive() {
            modal.style.display = 'none';
            document.body.classList.remove('immersive-active');
        }

        function exportCardAsImage(cardElement) {
            html2canvas(cardElement, { scale: 1.5, backgroundColor: '#ffffff' }).then(canvas => {
                const link = document.createElement('a');
                link.download = `song-${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            }).catch(err => alert('截图失败：' + err));
        }

        function addNewCard() {
            const newSong = {};
            FIELDS.forEach(f => newSong[f.key] = '');
            newSong.starred = false;
            songsData.push(newSong);
            expandedState.push(true);
            currentSearchTerm = '';
            searchInput.value = '';
            showOnlyStarred = false;
            updateStarFilterButton();
            renderCards();
            saveToStorage();
        }

        function resetToDefault() {
            if (confirm('用默认示例替换当前所有数据？')) {
                songsData = JSON.parse(JSON.stringify(DEFAULT_SONGS));
                expandedState = new Array(songsData.length).fill(false);
                vocabNotes = {};
                currentSearchTerm = '';
                searchInput.value = '';
                showOnlyStarred = false;
                updateStarFilterButton();
                renderCards();
                saveToStorage();
            }
        }

        // 导出备份（包含歌曲和笔记）
        function exportToJson() {
            const exportData = {
                songs: songsData,
                notes: vocabNotes
            };
            const dataStr = JSON.stringify(exportData, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.download = `songs_backup_${new Date().toISOString().slice(0,10)}.json`;
            a.href = url;
            a.click();
            URL.revokeObjectURL(url);
        }

        // 导入备份
        function importFromJson(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (Array.isArray(imported)) {
                        songsData = imported;
                        vocabNotes = {};
                    } else if (imported.songs && Array.isArray(imported.songs)) {
                        songsData = imported.songs;
                        vocabNotes = imported.notes || {};
                    } else {
                        alert('文件格式不正确，应为歌曲数组或包含songs/notes的对象');
                        return;
                    }
                    expandedState = new Array(songsData.length).fill(false);
                    currentSearchTerm = '';
                    searchInput.value = '';
                    showOnlyStarred = false;
                    updateStarFilterButton();
                    renderCards();
                    saveToStorage();
                    storageStatus.innerText = '导入成功！';
                } catch (err) {
                    alert('解析失败：' + err.message);
                }
            };
            reader.readAsText(file);
        }

        function performSearch() {
            currentSearchTerm = searchInput.value;
            renderCards();
        }

        function toggleStarFilter() {
            showOnlyStarred = !showOnlyStarred;
            updateStarFilterButton();
            renderCards();
        }

        // 新增：显示全部（清空搜索词）
        function resetSearch() {
            searchInput.value = '';
            currentSearchTerm = '';
            showOnlyStarred = false;  // 同时取消只看收藏
            updateStarFilterButton();
            renderCards();
        }

        function init() {
            loadFromStorage();
            currentSearchTerm = '';
            searchInput.value = '';
            showOnlyStarred = false;
            updateStarFilterButton();
            renderCards();
            saveToStorage(true);

            // 顶部按钮
            document.getElementById('addCardBtn').addEventListener('click', addNewCard);
            searchBtn.addEventListener('click', performSearch);
            searchInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') performSearch(); });

            // 工具箱开关
            toolboxToggleBtn.addEventListener('click', openToolbox);
            closeToolboxBtn.addEventListener('click', closeToolbox);
            overlay.addEventListener('click', closeToolbox);

            // 工具箱内按钮
            document.getElementById('toolboxSaveBtn').addEventListener('click', exportToJson);
            document.getElementById('toolboxLoadBtn').addEventListener('click', () => importFile.click());
            document.getElementById('toolboxResetBtn').addEventListener('click', resetToDefault);
            toolboxStarFilterBtn.addEventListener('click', toggleStarFilter);
            toolboxResetSearchBtn.addEventListener('click', resetSearch); // 新增事件

            importFile.addEventListener('change', (e) => {
                if (e.target.files.length) importFromJson(e.target.files[0]);
                e.target.value = '';
            });

            closeImmersiveBtn.addEventListener('click', closeImmersive);
            modal.addEventListener('click', (e) => { if (e.target === modal) closeImmersive(); });
        }

        window.addEventListener('DOMContentLoaded', init);
    })();
</script>
</body>
</html>
