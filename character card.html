<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>成为你想成为的人 · 每日探险</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f7f4ef;
      font-family: 'Segoe UI', 'Noto Serif SC', '楷体', KaiTi, serif;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; padding: 1.5rem; color: #3e3a37;
    }
    .container {
      max-width: 520px; width: 100%;
      background: #fffbf5; border-radius: 2.5rem; padding: 2.5rem 2rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.06); border: 1px solid #ede6dc;
      display: flex; flex-direction: column; gap: 1.8rem;
    }
    h1 { font-weight: 400; text-align: center; color: #5b5248; }
    .sub { text-align: center; color: #9b8c7c; font-size: 0.9rem; margin-top: -0.5rem; }
    .quality-box {
      background: #faf7f0; border-radius: 2rem; padding: 1.5rem;
      text-align: center; border: 1px dashed #d4c8b6;
    }
    .quality-word { font-size: 2.5rem; color: #4d4438; }
    .edit-hint { font-size: 0.7rem; color: #bbb0a0; cursor: pointer; margin-top: 0.5rem; }
    .challenge-card {
      background: #f3efe4; border-radius: 2rem; padding: 1.4rem;
      text-align: center; border: 1px solid #e3d8c4;
    }
    .challenge-text { font-size: 1.15rem; color: #5b4e3a; margin-bottom: 0.9rem; }
    .reroll-btn {
      background: #fefcf8; border: 1px solid #d4c5a5; color: #8b7a5c;
      padding: 0.4rem 1.2rem; border-radius: 2rem; cursor: pointer;
    }
    .reroll-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .vote-btn {
      background: #e7ddcb; border: 1px solid #d6c6ab; padding: 0.9rem 2.8rem;
      border-radius: 4rem; font-size: 1.2rem; cursor: pointer; display: block; margin: 0 auto;
    }
    .vote-btn:disabled { opacity: 0.6; cursor: not-allowed; background: #e5ddce; }
    .status-message { text-align: center; color: #7b6e5d; min-height: 2rem; }
    .streak-row {
      display: flex; justify-content: space-between; background: #f9f5ec;
      padding: 0.9rem 1.2rem; border-radius: 2rem; font-size: 0.85rem;
    }
    .history-toggle { background: none; border: none; color: #aa9b86; cursor: pointer; }
    .history-panel {
      display: none; background: #fcfaf5; border-radius: 1.5rem; padding: 1.2rem;
      max-height: 200px; overflow-y: auto; border: 1px solid #eee4d6;
    }
    .history-panel.show { display: block; }
    .history-item { display: flex; justify-content: space-between; padding: 0.4rem 0; border-bottom: 1px dotted #e6dac8; }
    .reset-area { text-align: center; }
    .reset-btn {
      background: none; border: none; color: #b7a58b; cursor: pointer; text-decoration: underline;
      margin: 0 0.5rem;
    }
    .diary-input {
      width: 100%; border: 1px solid #d6c6ab; border-radius: 1rem; padding: 0.5rem;
      font-family: inherit; background: #fefcf8; margin-top: 0.5rem;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>🗺️ 每日探险</h1>
  <div class="sub">为你想成为的人，投一票。完成一个微挑战。</div>

  <div class="quality-box">
    <div class="quality-word" id="qualityWordDisplay">轻盈的</div>
    <div class="edit-hint" id="editQualityHint">✎ 修改品质</div>
  </div>

  <div class="challenge-card">
    <div style="font-size:0.8rem; color:#b7a48b;">🌀 今日探索挑战</div>
    <div class="challenge-text" id="challengeText"></div>
    <button class="reroll-btn" id="rerollButton">🎲 换个挑战</button>
    <div style="font-size:0.7rem; color:#bfb09a;" id="rerollsLeft"></div>
  </div>

  <button class="vote-btn" id="voteButton">🗳️ 今日投票</button>
  <div class="status-message" id="statusMessage"></div>

  <div class="streak-row">
    <span>🔥 连续 <span id="streakCount">0</span> 天</span>
    <span>📅 总投票 <span id="totalVotes">0</span> 次</span>
  </div>

  <button class="history-toggle" id="historyToggle">📜 查看历史记录</button>
  <div class="history-panel" id="historyPanel">
    <div id="historyList"></div>
  </div>

  <div class="reset-area">
    <button class="reset-btn" id="resetAllBtn">重置全部</button>
    <button class="reset-btn" id="zeroVoteSimulate">⚡ 零号投票</button>
  </div>
  <div style="font-size:0.7rem; color:#bfb09a; text-align:center;">
    💡 零号投票：连续两天没投时，用它轻轻回来。
  </div>
</div>

<script>
  (function() {
    const STORAGE_KEY = 'identity_vote_v3_diary';

    // 挑战库
    const CHALLENGE_POOLS = {
      body: [
        "踮着脚尖走五步路。",
        "伸一个完整的懒腰。",
        "最慢的速度喝一口水。",
        "无人处抖动全身15秒。",
        "闭眼深呼吸三次。",
        "对窗外天空看10秒。"
      ],
      focus: [
        "观察身边物体三个未注意的细节。",
        "只听一段声音，不评判。",
        "做下一件事前停顿3秒。",
        "找一个颜色，接下来一小时数它出现次数。",
        "读三行文字，然后复述。"
      ],
      connection: [
        "在心里祝福一个陌生人。",
        "对身边的人说一句真诚的赞美。",
        "给久未联系的人发一句问候。",
        "听人说话时只听不打断。",
        "观察一个人的手，想象它做的温柔事。"
      ],
      play: [
        "给无生命物体起个可爱名字。",
        "画个笑脸，对自己笑一下。",
        "走路踩出小节奏。",
        "把一件事用唱歌的调子想出来。",
        "今天刻意用三次某个有趣的词。"
      ],
      spirit: [
        "问自己：此刻我存在吗？回答：是的。",
        "写下今天最真实的一句话。",
        "做一件纯粹为了‘美’的小事。",
        "回想最初定义品质的那个瞬间。",
        "对自己说：我允许不完美，但仍走一步。"
      ]
    };
    const ALL_CHALLENGES = Object.values(CHALLENGE_POOLS).flat();

    const DEFAULT_DATA = {
      quality: '轻盈的',
      votes: {},
      lastVoteDate: null,
      dailyChallengeSeed: null,
      rerollsUsed: 0,
      completedChallenges: {},   // { 'YYYY-MM-DD': '挑战文本' }
      diaries: {}                // { 'YYYY-MM-DD': '一句话日记' }
    };

    function loadData() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return { ...DEFAULT_DATA, votes: {}, completedChallenges: {}, diaries: {} };
      try {
        return { ...DEFAULT_DATA, ...JSON.parse(raw) };
      } catch(e) {
        return { ...DEFAULT_DATA, votes: {}, completedChallenges: {}, diaries: {} };
      }
    }

    function saveData(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

    let appData = loadData();

    function getTodayString() { return new Date().toISOString().split('T')[0]; }

    function computeStreak(votes) {
      let streak = 0;
      const today = new Date();
      for (let i = 0; i < 365; i++) {
        const d = new Date(today);
        d.setDate(today.getDate() - i);
        if (votes[d.toISOString().split('T')[0]]) streak++;
        else break;
      }
      return streak;
    }

    function totalVoteCount(votes) { return Object.keys(votes).length; }

    function seededRandomIndex(seed, max) {
      let hash = 0;
      for (let i = 0; i < seed.length; i++) {
        hash = ((hash << 5) - hash) + seed.charCodeAt(i);
        hash |= 0;
      }
      return Math.abs(hash) % max;
    }

    function getTodayChallenge() {
      const today = getTodayString();
      if (appData.dailyChallengeSeed && appData.dailyChallengeSeed.startsWith('reroll:')) {
        const idx = parseInt(appData.dailyChallengeSeed.split(':')[1], 10);
        return ALL_CHALLENGES[idx % ALL_CHALLENGES.length];
      }
      const idx = seededRandomIndex(today, ALL_CHALLENGES.length);
      return ALL_CHALLENGES[idx];
    }

    function rerollChallenge() {
      if (appData.rerollsUsed >= 3) return alert('今天已更换三次。');
      const newIdx = Math.floor(Math.random() * ALL_CHALLENGES.length);
      appData.dailyChallengeSeed = `reroll:${newIdx}`;
      appData.rerollsUsed = (appData.rerollsUsed || 0) + 1;
      saveData(appData);
      refreshUI();
    }

    function resetDailyIfNewDay() {
      const today = getTodayString();
      if (appData.lastVoteDate !== today) {
        if (!appData.dailyChallengeSeed || !appData.dailyChallengeSeed.startsWith('reroll:')) {
          appData.dailyChallengeSeed = null;
        }
        appData.rerollsUsed = 0;
      }
    }

    const qualityWordDisplay = document.getElementById('qualityWordDisplay');
    const editQualityHint = document.getElementById('editQualityHint');
    const challengeText = document.getElementById('challengeText');
    const rerollButton = document.getElementById('rerollButton');
    const rerollsLeft = document.getElementById('rerollsLeft');
    const voteButton = document.getElementById('voteButton');
    const statusMessage = document.getElementById('statusMessage');
    const streakCountSpan = document.getElementById('streakCount');
    const totalVotesSpan = document.getElementById('totalVotes');
    const historyToggle = document.getElementById('historyToggle');
    const historyPanel = document.getElementById('historyPanel');
    const historyList = document.getElementById('historyList');
    const resetAllBtn = document.getElementById('resetAllBtn');
    const zeroVoteSimulate = document.getElementById('zeroVoteSimulate');

    function refreshUI() {
      resetDailyIfNewDay();
      const today = getTodayString();
      const hasVotedToday = !!appData.votes[today];

      qualityWordDisplay.textContent = appData.quality;
      challengeText.textContent = getTodayChallenge();
      const used = appData.rerollsUsed || 0;
      rerollsLeft.textContent = `今日还可更换 ${3 - used} 次`;
      rerollButton.disabled = (3 - used) <= 0;

      if (hasVotedToday) {
        voteButton.disabled = true;
        voteButton.innerHTML = '✅ 今日已投票';
        statusMessage.innerHTML = '✨ 今天已经投票。挑战完成了吗？';
      } else {
        voteButton.disabled = false;
        voteButton.innerHTML = '🗳️ 今日投票';
        const y = new Date(); y.setDate(y.getDate()-1); const yStr = y.toISOString().split('T')[0];
        const db = new Date(); db.setDate(db.getDate()-2); const dbStr = db.toISOString().split('T')[0];
        if (!appData.votes[yStr] && !appData.votes[dbStr]) {
          statusMessage.innerHTML = '⏳ 你已连续两天没投票，今天用零号投票轻轻回来吧。';
        } else if (!appData.votes[yStr]) {
          statusMessage.innerHTML = '🍃 昨天休息，今天轻轻回来。';
        } else {
          statusMessage.innerHTML = '🌱 新的一天，投票并接受挑战。';
        }
      }

      streakCountSpan.textContent = computeStreak(appData.votes);
      totalVotesSpan.textContent = totalVoteCount(appData.votes);
      renderHistory();
    }

    function renderHistory() {
      const dates = Object.keys(appData.votes).sort().reverse();
      if (!dates.length) {
        historyList.innerHTML = '<div style="color:#b7a68b; padding:0.8rem;">暂无记录。</div>';
        return;
      }
      let html = '';
      for (let d of dates.slice(0, 14)) {
        const challenge = appData.completedChallenges?.[d] || '';
        const diary = appData.diaries?.[d] || '';
        let line = `🗳️ 投票`;
        if (challenge) line += ` · 挑战：${challenge}`;
        if (diary) line += ` · 📝 ${diary}`;
        html += `<div class="history-item"><span>${d}</span><span>${line}</span></div>`;
      }
      historyList.innerHTML = html;
    }

    function castVote() {
      const today = getTodayString();
      if (appData.votes[today]) return alert('今日已投票。');
      // 记录投票和挑战
      appData.votes[today] = true;
      appData.lastVoteDate = today;
      const challenge = getTodayChallenge();
      appData.completedChallenges[today] = challenge;
      // 弹出微日记（可选）
      const diary = prompt('📝 想写一句微日记吗？(可留空)', '');
      if (diary && diary.trim()) {
        appData.diaries[today] = diary.trim();
      }
      saveData(appData);
      refreshUI();
    }

    function editQuality() {
      const nq = prompt('输入你的品质形容词：', appData.quality);
      if (nq && nq.trim()) {
        appData.quality = nq.trim();
        saveData(appData);
        refreshUI();
      }
    }

    function resetAll() {
      if (confirm('清除所有投票、挑战和日记？')) {
        appData = { ...DEFAULT_DATA, votes: {}, completedChallenges: {}, diaries: {} };
        saveData(appData);
        refreshUI();
      }
    }

    function toggleHistory() { historyPanel.classList.toggle('show'); }

    voteButton.addEventListener('click', castVote);
    editQualityHint.addEventListener('click', editQuality);
    qualityWordDisplay.addEventListener('click', editQuality);
    rerollButton.addEventListener('click', rerollChallenge);
    resetAllBtn.addEventListener('click', resetAll);
    zeroVoteSimulate.addEventListener('click', () => {
      const today = getTodayString();
      if (appData.votes[today]) return alert('今日已投票。');
      // 零号投票：直接记录，不要求挑战日记
      appData.votes[today] = true;
      appData.lastVoteDate = today;
      appData.completedChallenges[today] = '零号投票：只是出现';
      saveData(appData);
      refreshUI();
      statusMessage.innerHTML = '🌿 零号投票完成。你出现了，就够了。';
    });
    historyToggle.addEventListener('click', toggleHistory);

    refreshUI();
  })();
</script>
</body>
</html>
