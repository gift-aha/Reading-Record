<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>📚 书架·一书多笔记（可编辑书籍）</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #f5f1eb;
            color: #2c2c2c;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .app-container { max-width: 1400px; width: 100%; }

        /* 头部 */
        .header {
            display: flex; align-items: center; gap: 12px; margin-bottom: 28px; flex-wrap: wrap;
        }
        .header h1 {
            font-size: 2.2rem; font-weight: 500; color: #3b2e24;
            border-left: 8px solid #b68b6e; padding-left: 20px;
        }
        .stats-mini {
            margin-left: auto; background: #e8ddd2; padding: 10px 20px; border-radius: 40px;
            font-size: 1rem; color: #4f3f32;
        }
        .stats-mini span {
            font-weight: 700; background: #fff1e4; padding: 4px 10px; border-radius: 30px; margin-left: 6px;
        }

        /* 双表单卡片 */
        .forms-row {
            display: flex;
            gap: 20px;
            margin-bottom: 35px;
            flex-wrap: wrap;
        }
        .form-card {
            flex: 1 1 300px;
            background: white;
            border-radius: 32px;
            padding: 24px 26px;
            box-shadow: 0 15px 30px -10px rgba(80, 60, 40, 0.15);
            border: 1px solid #f0e4d8;
        }
        .form-card h3 {
            display: flex; align-items: center; gap: 8px;
            font-size: 1.4rem; font-weight: 500; color: #5f4c3b;
            margin-bottom: 18px;
        }
        .input-field {
            display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px;
        }
        .input-field label {
            font-size: 0.85rem; font-weight: 600; text-transform: uppercase; color: #7b6352;
        }
        .input-field input, .input-field select, .input-field textarea {
            background: #fcf9f6; border: 1px solid #ddcfc2; border-radius: 24px;
            padding: 12px 18px; font-size: 0.95rem; outline: none; font-family: inherit;
        }
        .input-field input:focus, .input-field select:focus, .input-field textarea:focus {
            border-color: #b68b6e; box-shadow: 0 0 0 3px rgba(182, 139, 110, 0.2); background: white;
        }
        .form-actions {
            display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px;
        }
        .btn {
            background: #ede0d4; border: none; border-radius: 40px; padding: 12px 24px;
            font-weight: 600; font-size: 1rem; color: #4b3b2e; cursor: pointer;
            display: inline-flex; align-items: center; gap: 8px; border: 1px solid transparent;
        }
        .btn-primary {
            background: #9f7e66; color: white; box-shadow: 0 5px 12px rgba(159, 126, 102, 0.3);
        }
        .btn-primary:hover { background: #8b6d57; transform: translateY(-2px); }
        .btn-secondary:hover { background: #dacbbc; }

        /* 过滤栏 */
        .filter-bar {
            background: #fffbf7; border-radius: 60px; padding: 15px 25px; margin-bottom: 30px;
            display: flex; flex-wrap: wrap; align-items: center; gap: 18px 30px;
            border: 1px solid #efded0;
        }
        .filter-item {
            display: flex; align-items: center; gap: 10px;
        }
        .filter-item i { color: #b49178; width: 22px; font-size: 1.2rem; }
        .filter-item input, .filter-item select {
            background: white; border: 1px solid #dbcbba; border-radius: 40px;
            padding: 8px 20px; font-size: 0.95rem; min-width: 200px; outline: none;
        }

        /* 书籍网格 */
        .books-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 24px;
        }
        .book-card {
            background: white; border-radius: 28px; padding: 0; overflow: hidden;
            box-shadow: 0 10px 18px rgba(110, 80, 60, 0.08); border: 1px solid #f5e3d4;
            transition: 0.25s ease;
        }
        .book-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -8px rgba(130,90,60,0.15); }
        
        /* 书籍头部（可点击折叠，并包含操作按钮） */
        .book-header {
            background: #fcf6f0; padding: 18px 22px; cursor: pointer;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 2px solid #f0dfd1;
        }
        .book-header-left { display: flex; flex-direction: column; gap: 4px; flex: 1; }
        .book-title { font-size: 1.5rem; font-weight: 700; color: #2c1f16; }
        .book-author { font-size: 1rem; color: #9f816b; display: flex; align-items: center; gap: 6px; }
        .book-header-right {
            display: flex; align-items: center; gap: 15px;
        }
        .avg-rating {
            color: #e6b422; font-size: 0.9rem; white-space: nowrap;
        }
        .book-status-badge {
            background: #dccfc4; padding: 4px 12px; border-radius: 50px; font-size: 0.8rem; font-weight: 600;
        }
        .status-wish { background: #f1e3d1; color: #785d45; }
        .status-reading { background: #d9e3e0; color: #1f6d5a; }
        .status-read { background: #d5e1d5; color: #2c6e3b; }
        .book-actions {
            display: flex; gap: 8px; margin-left: 10px;
        }
        .book-actions button {
            background: none; border: none; font-size: 1.1rem; cursor: pointer;
            width: 34px; height: 34px; border-radius: 50%;
            display: inline-flex; align-items: center; justify-content: center;
            color: #7a624f; transition: 0.1s;
        }
        .book-actions .edit-book-btn:hover { background: #e7d9ce; color: #2c1f16; }
        .book-actions .delete-book-btn:hover { background: #f7dad2; color: #b63e2a; }
        .expand-icon { font-size: 1.4rem; color: #b3927c; margin-left: 5px; }

        /* 笔记区域 */
        .notes-container {
            padding: 20px 22px; background: white; border-top: 1px solid #f8ede2;
        }
        .note-item {
            background: #fefcf9; border-radius: 20px; padding: 18px;
            margin-bottom: 16px; border: 1px solid #f0e0d2; position: relative;
        }
        .note-meta {
            display: flex; gap: 20px; align-items: center; margin-bottom: 12px;
            font-size: 0.9rem; color: #836b58;
        }
        .note-rating {
            color: #e6b422; letter-spacing: 1px;
        }
        .note-content {
            line-height: 1.6; color: #3d2e23; margin-bottom: 10px; white-space: pre-wrap;
        }
        .note-actions {
            position: absolute; top: 18px; right: 18px; display: flex; gap: 10px;
        }
        .note-actions button {
            background: none; border: none; font-size: 1rem; cursor: pointer;
            width: 32px; height: 32px; border-radius: 50%; display: inline-flex;
            align-items: center; justify-content: center; color: #7a624f;
        }
        .note-actions .edit-note-btn:hover { background: #e7d9ce; }
        .note-actions .delete-note-btn:hover { background: #f7dad2; color: #b63e2a; }
        .add-note-btn {
            margin-top: 15px; width: 100%; background: #f2ebe4; border: 1px dashed #c7aa92;
            border-radius: 40px; padding: 12px; color: #5f4b39; font-weight: 600;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            cursor: pointer; transition: 0.1s;
        }
        .add-note-btn:hover { background: #ead9cc; }

        .empty-notes {
            text-align: center; color: #b7a392; padding: 30px 20px;
            background: #fbf5ef; border-radius: 40px;
        }

        /* 内联笔记表单（添加/编辑）—— 未使用内联，但保留样式 */
        .inline-note-form {
            background: #f6eee7; border-radius: 24px; padding: 20px; margin-top: 16px;
            border: 1px solid #ddcfc2;
        }
        .inline-note-form .input-field { margin-bottom: 12px; }
        .inline-actions { display: flex; gap: 12px; justify-content: flex-end; }

        .hidden { display: none; }
        .footer-note { margin-top: 40px; text-align: center; color: #b7a392; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <i class="fas fa-book-open"></i>
        <h1>书籍·笔记</h1>
        <div class="stats-mini" id="statsDisplay">
            <i class="fa-regular fa-book"></i> 书籍 <span id="totalBooks">0</span>
            <i class="fa-regular fa-note-sticky" style="margin-left: 12px;"></i> 笔记 <span id="totalNotes">0</span>
        </div>
    </div>

    <!-- 双表单：书籍表单 + 笔记表单（全局） -->
    <div class="forms-row">
        <!-- 书籍表单 -->
        <div class="form-card">
            <h3><i class="fa-regular fa-book"></i> 书籍</h3>
            <form id="bookForm">
                <div class="input-field">
                    <label>书名 *</label>
                    <input type="text" id="bookTitleInput" placeholder="例：三体" required>
                </div>
                <div class="input-field">
                    <label>作者</label>
                    <input type="text" id="bookAuthorInput" placeholder="刘慈欣">
                </div>
                <div class="input-field">
                    <label>阅读状态</label>
                    <select id="bookStatusSelect">
                        <option value="想读">📌 想读</option>
                        <option value="在读">📖 在读</option>
                        <option value="已读">✅ 已读</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="resetBookFormBtn"><i class="fa-regular fa-pen-to-square"></i> 重置</button>
                    <button type="submit" class="btn btn-primary" id="submitBookBtn"><i class="fa-regular fa-floppy-disk"></i> 添加书籍</button>
                </div>
            </form>
        </div>

        <!-- 笔记表单（全局） -->
        <div class="form-card">
            <h3><i class="fa-regular fa-note-sticky"></i> 笔记</h3>
            <form id="noteForm">
                <div class="input-field">
                    <label>选择书籍 *</label>
                    <select id="noteBookSelect" required>
                        <option value="">-- 选择书籍 --</option>
                    </select>
                </div>
                <div class="input-field">
                    <label>日期</label>
                    <input type="date" id="noteDateInput">
                </div>
                <div class="input-field">
                    <label>评分 (1-5)</label>
                    <select id="noteRatingSelect">
                        <option value="1">⭐</option>
                        <option value="2">⭐⭐</option>
                        <option value="3" selected>⭐⭐⭐</option>
                        <option value="4">⭐⭐⭐⭐</option>
                        <option value="5">⭐⭐⭐⭐⭐</option>
                    </select>
                </div>
                <div class="input-field">
                    <label>笔记内容</label>
                    <textarea id="noteContentInput" rows="3" placeholder="写下你的感想..."></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="resetNoteFormBtn"><i class="fa-regular fa-pen-to-square"></i> 重置</button>
                    <button type="submit" class="btn btn-primary" id="submitNoteBtn"><i class="fa-regular fa-floppy-disk"></i> 添加笔记</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 筛选栏 -->
    <div class="filter-bar">
        <div class="filter-item">
            <i class="fa-regular fa-magnifying-glass"></i>
            <input type="text" id="searchInput" placeholder="搜索书名或作者...">
        </div>
        <div class="filter-item">
            <i class="fa-regular fa-filter"></i>
            <select id="statusFilter">
                <option value="全部">📋 全部状态</option>
                <option value="想读">📌 想读</option>
                <option value="在读">📖 在读</option>
                <option value="已读">✅ 已读</option>
            </select>
        </div>
        <div class="filter-item">
            <i class="fa-regular fa-arrow-down-wide-short"></i>
            <select id="sortSelect">
                <option value="newest">⏱️ 最新添加</option>
                <option value="title">🔤 书名 A-Z</option>
                <option value="rating">⭐ 平均高分</option>
            </select>
        </div>
    </div>

    <!-- 书籍卡片网格（动态渲染） -->
    <div id="booksContainer" class="books-grid"></div>
    <div class="footer-note"><i class="fa-regular fa-floppy-disk"></i> 数据自动保存在浏览器中</div>
</div>

<script>
(function() {
    // ---------- 转义函数 ----------
    function escapeHtml(unsafe) {
        return unsafe.replace(/[&<>"]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            if (m === '"') return '&quot;';
            return m;
        });
    }

    // ---------- 数据 ----------
    let books = [];
    let notes = [];

    // 编辑状态
    let editingBookId = null;        // 正在编辑的书籍id
    let editingNoteId = null;        // 正在编辑的笔记id

    // 筛选排序
    let filters = { search: '', status: '全部' };
    let sortBy = 'newest';

    // DOM 元素
    const booksContainer = document.getElementById('booksContainer');
    const bookForm = document.getElementById('bookForm');
    const bookTitleInput = document.getElementById('bookTitleInput');
    const bookAuthorInput = document.getElementById('bookAuthorInput');
    const bookStatusSelect = document.getElementById('bookStatusSelect');
    const submitBookBtn = document.getElementById('submitBookBtn');
    const resetBookBtn = document.getElementById('resetBookFormBtn');

    const noteForm = document.getElementById('noteForm');
    const noteBookSelect = document.getElementById('noteBookSelect');
    const noteDateInput = document.getElementById('noteDateInput');
    const noteRatingSelect = document.getElementById('noteRatingSelect');
    const noteContentInput = document.getElementById('noteContentInput');
    const submitNoteBtn = document.getElementById('submitNoteBtn');
    const resetNoteBtn = document.getElementById('resetNoteFormBtn');

    const searchInput = document.getElementById('searchInput');
    const statusFilter = document.getElementById('statusFilter');
    const sortSelect = document.getElementById('sortSelect');
    const totalBooksSpan = document.getElementById('totalBooks');
    const totalNotesSpan = document.getElementById('totalNotes');

    // ---------- 本地存储 ----------
    function saveAll() {
        localStorage.setItem('books2', JSON.stringify(books));
        localStorage.setItem('notes2', JSON.stringify(notes));
    }

    function loadAll() {
        const storedBooks = localStorage.getItem('books2');
        const storedNotes = localStorage.getItem('notes2');
        if (storedBooks) {
            try { books = JSON.parse(storedBooks); } catch { books = []; }
        } else {
            // 示例书籍
            books = [
                { id: Date.now() - 500000, title: '三体', author: '刘慈欣', status: '在读' },
                { id: Date.now() - 400000, title: '活着', author: '余华', status: '已读' },
            ];
        }
        if (storedNotes) {
            try { notes = JSON.parse(storedNotes); } catch { notes = []; }
        } else {
            // 示例笔记
            const today = new Date().toISOString().slice(0,10);
            notes = [
                { id: Date.now() - 300000, bookId: books[0].id, content: '黑暗森林理论令人震撼。', date: '2024-03-10', rating: 5 },
                { id: Date.now() - 200000, bookId: books[0].id, content: '第二遍读，注意到更多细节。', date: today, rating: 5 },
                { id: Date.now() - 100000, bookId: books[1].id, content: '人是为了活着本身而活着。', date: '2024-02-01', rating: 4 },
            ];
        }
        // 确保每个笔记有rating数字
        notes = notes.map(n => ({ ...n, rating: n.rating ? Number(n.rating) : 3 }));
    }

    // 更新统计
    function updateStats() {
        totalBooksSpan.innerText = books.length;
        totalNotesSpan.innerText = notes.length;
    }

    // 刷新书籍下拉列表
    function refreshBookSelect() {
        let options = '<option value="">-- 选择书籍 --</option>';
        books.forEach(b => {
            options += `<option value="${b.id}">${escapeHtml(b.title)} (${escapeHtml(b.author || '佚名')})</option>`;
        });
        noteBookSelect.innerHTML = options;
    }

    // 计算书籍平均评分
    function getAvgRating(bookId) {
        const bookNotes = notes.filter(n => n.bookId === bookId);
        if (bookNotes.length === 0) return 0;
        const sum = bookNotes.reduce((acc, n) => acc + n.rating, 0);
        return sum / bookNotes.length;
    }

    // 渲染所有书籍卡片
    function renderBooks() {
        // 过滤书籍
        let filtered = books.filter(book => {
            if (filters.status !== '全部' && book.status !== filters.status) return false;
            if (filters.search.trim()) {
                const term = filters.search.toLowerCase().trim();
                const titleMatch = book.title.toLowerCase().includes(term);
                const authorMatch = book.author ? book.author.toLowerCase().includes(term) : false;
                return titleMatch || authorMatch;
            }
            return true;
        });

        // 排序书籍
        if (sortBy === 'title') {
            filtered.sort((a, b) => a.title.localeCompare(b.title));
        } else if (sortBy === 'rating') {
            filtered.sort((a, b) => getAvgRating(b.id) - getAvgRating(a.id));
        } else { // newest
            filtered.sort((a, b) => b.id - a.id);
        }

        if (filtered.length === 0) {
            booksContainer.innerHTML = `<div class="empty-message" style="grid-column:1/-1; text-align:center; padding:60px;">📭 没有匹配的书籍，添加一本吧。</div>`;
            updateStats();
            return;
        }

        let html = '';
        filtered.forEach(book => {
            const safeTitle = escapeHtml(book.title);
            const safeAuthor = escapeHtml(book.author || '佚名');
            const statusClass = book.status === '想读' ? 'status-wish' : (book.status === '在读' ? 'status-reading' : 'status-read');
            const avgRating = getAvgRating(book.id);
            const fullStars = Math.floor(avgRating);
            const starsHtml = Array(5).fill(0).map((_, i) => 
                i < fullStars ? '<i class="fa-solid fa-star"></i>' : '<i class="fa-regular fa-star"></i>'
            ).join('');

            // 获取该书籍的所有笔记，按日期倒序
            const bookNotes = notes.filter(n => n.bookId === book.id).sort((a,b) => new Date(b.date) - new Date(a.date));

            // 构建笔记列表html
            let notesHtml = '';
            if (bookNotes.length === 0) {
                notesHtml = `<div class="empty-notes"><i class="fa-regular fa-face-smile"></i> 暂无笔记</div>`;
            } else {
                bookNotes.forEach(note => {
                    const safeContent = escapeHtml(note.content || '');
                    const noteDate = note.date ? note.date.replace(/-/g, '/') : '未设置';
                    const noteStars = Array(5).fill(0).map((_, i) => 
                        i < note.rating ? '<i class="fa-solid fa-star"></i>' : '<i class="fa-regular fa-star"></i>'
                    ).join('');
                    notesHtml += `
                        <div class="note-item" data-note-id="${note.id}">
                            <div class="note-meta">
                                <span><i class="fa-regular fa-calendar"></i> ${noteDate}</span>
                                <span class="note-rating">${noteStars}</span>
                            </div>
                            <div class="note-content">${safeContent}</div>
                            <div class="note-actions">
                                <button class="edit-note-btn" data-note-id="${note.id}" title="编辑笔记"><i class="fa-regular fa-pen-to-square"></i></button>
                                <button class="delete-note-btn" data-note-id="${note.id}" title="删除笔记"><i class="fa-regular fa-trash-can"></i></button>
                            </div>
                        </div>
                    `;
                });
            }

            // 构建书籍卡片头部（含编辑/删除按钮）
            html += `
                <div class="book-card" data-book-id="${book.id}">
                    <div class="book-header">
                        <div class="book-header-left">
                            <span class="book-title">${safeTitle}</span>
                            <span class="book-author"><i class="fa-regular fa-pencil"></i> ${safeAuthor}</span>
                        </div>
                        <div class="book-header-right">
                            <span class="avg-rating" title="平均评分">${starsHtml}</span>
                            <span class="book-status-badge ${statusClass}">${book.status}</span>
                            <div class="book-actions">
                                <button class="edit-book-btn" data-book-id="${book.id}" title="编辑书籍"><i class="fa-regular fa-pen-to-square"></i></button>
                                <button class="delete-book-btn" data-book-id="${book.id}" title="删除书籍"><i class="fa-regular fa-trash-can"></i></button>
                            </div>
                            <span class="expand-icon"><i class="fa-regular fa-chevron-down"></i></span>
                        </div>
                    </div>
                    <div class="notes-container">
                        ${notesHtml}
                        <div class="add-note-btn" data-book-id="${book.id}"><i class="fa-regular fa-plus"></i> 为本书添加笔记</div>
                    </div>
                </div>
            `;
        });

        booksContainer.innerHTML = html;
        updateStats();
        refreshBookSelect(); // 更新下拉，因为书籍可能变化
    }

    // ---------- 重置表单 ----------
    function resetBookForm() {
        bookTitleInput.value = '';
        bookAuthorInput.value = '';
        bookStatusSelect.value = '想读';
        editingBookId = null;
        submitBookBtn.innerHTML = '<i class="fa-regular fa-floppy-disk"></i> 添加书籍';
    }

    function resetNoteForm() {
        noteBookSelect.value = '';
        noteDateInput.value = new Date().toISOString().slice(0, 10);
        noteRatingSelect.value = '3';
        noteContentInput.value = '';
        editingNoteId = null;
        submitNoteBtn.innerHTML = '<i class="fa-regular fa-floppy-disk"></i> 添加笔记';
        noteBookSelect.disabled = false; // 确保启用
    }

    // 填充笔记表单用于编辑
    function fillNoteFormForEdit(note) {
        noteBookSelect.value = note.bookId;
        noteBookSelect.disabled = true; // 不允许修改书籍
        noteDateInput.value = note.date || new Date().toISOString().slice(0,10);
        noteRatingSelect.value = String(note.rating || 3);
        noteContentInput.value = note.content || '';
        editingNoteId = note.id;
        submitNoteBtn.innerHTML = '<i class="fa-regular fa-pen-to-square"></i> 更新笔记';
    }

    // 填充书籍表单用于编辑
    function fillBookFormForEdit(book) {
        bookTitleInput.value = book.title;
        bookAuthorInput.value = book.author || '';
        bookStatusSelect.value = book.status || '想读';
        editingBookId = book.id;
        submitBookBtn.innerHTML = '<i class="fa-regular fa-pen-to-square"></i> 更新书籍';
    }

    // ---------- 事件处理 ----------
    // 书籍表单提交
    bookForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const title = bookTitleInput.value.trim();
        if (!title) { alert('请输入书名'); return; }
        if (editingBookId) {
            // 更新
            const index = books.findIndex(b => b.id === editingBookId);
            if (index !== -1) {
                books[index] = { 
                    ...books[index], 
                    title, 
                    author: bookAuthorInput.value.trim() || '佚名',
                    status: bookStatusSelect.value
                };
            }
        } else {
            // 新增
            const newBook = {
                id: Date.now() + Math.random(),
                title,
                author: bookAuthorInput.value.trim() || '佚名',
                status: bookStatusSelect.value
            };
            books.push(newBook);
        }
        saveAll();
        renderBooks();
        resetBookForm();
    });

    // 笔记表单提交
    noteForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const bookId = noteBookSelect.value;
        if (!bookId) { alert('请选择书籍'); return; }
        const content = noteContentInput.value.trim();
        if (!content) { alert('请输入笔记内容'); return; }

        const noteData = {
            id: editingNoteId ? editingNoteId : Date.now() + Math.random(),
            bookId: Number(bookId),
            content: content,
            date: noteDateInput.value || new Date().toISOString().slice(0,10),
            rating: parseInt(noteRatingSelect.value, 10)
        };

        if (editingNoteId) {
            const index = notes.findIndex(n => n.id === editingNoteId);
            if (index !== -1) notes[index] = noteData;
        } else {
            notes.push(noteData);
        }
        saveAll();
        renderBooks();
        resetNoteForm();
    });

    // 重置按钮
    resetBookBtn.addEventListener('click', resetBookForm);
    resetNoteBtn.addEventListener('click', resetNoteForm);

    // 全局事件代理：处理书籍内的操作（添加笔记、编辑笔记、删除笔记、折叠、编辑书籍、删除书籍）
    booksContainer.addEventListener('click', (e) => {
        const target = e.target;

        // 添加笔记按钮
        if (target.closest('.add-note-btn')) {
            const btn = target.closest('.add-note-btn');
            const bookId = btn.dataset.bookId;
            resetNoteForm();
            noteBookSelect.value = bookId; // 预选书籍
            noteBookSelect.disabled = false; // 不禁用，但已预选
            noteForm.scrollIntoView({ behavior: 'smooth' });
            return;
        }

        // 删除笔记
        if (target.closest('.delete-note-btn')) {
            const btn = target.closest('.delete-note-btn');
            const noteId = Number(btn.dataset.noteId);
            if (confirm('删除此笔记？')) {
                notes = notes.filter(n => n.id !== noteId);
                if (editingNoteId === noteId) resetNoteForm();
                saveAll();
                renderBooks();
            }
            return;
        }

        // 编辑笔记
        if (target.closest('.edit-note-btn')) {
            const btn = target.closest('.edit-note-btn');
            const noteId = Number(btn.dataset.noteId);
            const note = notes.find(n => n.id === noteId);
            if (note) {
                fillNoteFormForEdit(note);
                noteForm.scrollIntoView({ behavior: 'smooth' });
            }
            return;
        }

        // 编辑书籍
        if (target.closest('.edit-book-btn')) {
            const btn = target.closest('.edit-book-btn');
            const bookId = Number(btn.dataset.bookId);
            const book = books.find(b => b.id === bookId);
            if (book) {
                fillBookFormForEdit(book);
                bookForm.scrollIntoView({ behavior: 'smooth' });
            }
            return;
        }

        // 删除书籍（同时删除其下所有笔记）
        if (target.closest('.delete-book-btn')) {
            const btn = target.closest('.delete-book-btn');
            const bookId = Number(btn.dataset.bookId);
            if (confirm('删除书籍将同时删除该书的所有笔记，确定吗？')) {
                books = books.filter(b => b.id !== bookId);
                notes = notes.filter(n => n.bookId !== bookId);
                if (editingBookId === bookId) resetBookForm();
                if (editingNoteId && notes.find(n => n.id === editingNoteId) === undefined) resetNoteForm();
                saveAll();
                renderBooks();
            }
            return;
        }

        // 书籍头部折叠/展开
        if (target.closest('.book-header')) {
            const header = target.closest('.book-header');
            const container = header.closest('.book-card').querySelector('.notes-container');
            const icon = header.querySelector('.expand-icon i');
            if (container.style.display === 'none') {
                container.style.display = 'block';
                icon.className = 'fa-regular fa-chevron-down';
            } else {
                container.style.display = 'none';
                icon.className = 'fa-regular fa-chevron-right';
            }
        }
    });

    // 筛选监听
    searchInput.addEventListener('input', () => {
        filters.search = searchInput.value;
        renderBooks();
    });
    statusFilter.addEventListener('change', () => {
        filters.status = statusFilter.value;
        renderBooks();
    });
    sortSelect.addEventListener('change', () => {
        sortBy = sortSelect.value;
        renderBooks();
    });

    // 初始化
    loadAll();
    resetBookForm();
    resetNoteForm();
    renderBooks();
})();
</script>
</body>
</html>
